<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет простоев</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 15px;
        }

        .card {
            max-width: 430px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        p {
            line-height: 1.4;
            margin: 10px 0;
            white-space: pre-line;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #2d89ef;
            color: white;
            cursor: pointer;
        }

        button:active {
            background: #1b5fa7;
        }

        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }

        .secondary {
            background: #777;
        }

        .secondary:active {
            background: #555;
        }

        .danger {
            background: #c0392b;
        }

        .danger:active {
            background: #962d22;
        }

        .success {
            background: #2e8b57;
        }

        .success:active {
            background: #256f46;
        }

        .muted {
            color: #666;
            font-size: 14px;
        }

        .summary {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .sending-note {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #fff8e1;
            color: #7a5d00;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card" id="screen-login">
    <h2>Учет простоев</h2>
    <p>Введите идентификатор:</p>
    <input id="nameInput" placeholder="ФЛА">
    <button onclick="saveName()">Продолжить</button>
</div>

<div class="card" id="screen-centers" style="display:none;">
    <h2>Выбор РЦ</h2>
    <p id="centersUserName"></p>
    <div id="centersList"></div>
    <button class="secondary" onclick="changeUser()">Сменить сотрудника</button>
</div>

<div class="card" id="screen-main" style="display:none;">
    <h2>Меню</h2>
    <p id="mainHeader"></p>

    <button class="danger" onclick="openStandardReasons()">🛑 Стандартный простой</button>
    <button onclick="openCustomReasons()">✍️ Нестандартный простой</button>
    <button class="secondary" onclick="openBadNorm()">📉 Некорректная норма</button>

    <button class="secondary" onclick="backToCenters()">🔁 Сменить РЦ</button>
    <button class="secondary" onclick="changeUser()">Сменить сотрудника</button>
</div>

<div class="card" id="screen-standard-reasons" style="display:none;">
    <h2>Стандартный простой</h2>
    <p id="standardHeader"></p>
    <div id="standardReasonsList"></div>
    <button class="secondary" onclick="showMainFromStorage()">🏠 Главное меню</button>
</div>

<div class="card" id="screen-custom-reasons" style="display:none;">
    <h2>Нестандартный простой</h2>
    <p id="customHeader"></p>
    <div id="customReasonsList"></div>
    <button class="secondary" onclick="showMainFromStorage()">🏠 Главное меню</button>
</div>

<div class="card" id="screen-custom-detail" style="display:none;">
    <h2>Уточнение</h2>
    <p id="customDetailHeader"></p>
    <p id="customPromptText"></p>
    <input id="customDetailInput" placeholder="">
    <button onclick="saveCustomDetail()">Продолжить</button>
    <button class="secondary" onclick="openCustomReasons()">⬅️ Назад</button>
</div>

<div class="card" id="screen-badnorm" style="display:none;">
    <h2>Некорректная норма</h2>
    <p id="badNormHeader"></p>
    <p>Введите позицию или описание, где неправильная норма:</p>
    <textarea id="badNormInput" placeholder="Например: S90 300*900*0,6 - неправильная норма"></textarea>
    <button onclick="openBadNormConfirm()">Продолжить</button>
    <button class="secondary" onclick="showMainFromStorage()">🏠 Главное меню</button>
</div>

<div class="card" id="screen-minutes" style="display:none;">
    <h2>Минуты</h2>
    <p id="minutesHeader"></p>
    <div id="quickMinutesList"></div>

    <p class="muted">Или введите вручную:</p>
    <input id="manualMinutesInput" placeholder="Например 12" inputmode="numeric">
    <button onclick="saveManualMinutes()">Продолжить</button>
    <button class="secondary" onclick="backFromMinutes()">⬅️ Назад</button>
</div>

<div class="card" id="screen-confirm" style="display:none;">
    <h2>Подтверждение</h2>
    <div class="summary" id="confirmSummary"></div>

    <button class="success" id="submitBtn" onclick="submitRecord()">✅ Подтвердить и отправить</button>
    <div id="sendingNote" class="sending-note">Подождите, запись отправляется...</div>

    <button class="secondary" onclick="backFromConfirm()">⬅️ Назад</button>
    <button class="secondary" onclick="showMainFromStorage()">🏠 Главное меню</button>
</div>

<div class="card" id="screen-success" style="display:none;">
    <h2>Готово</h2>
    <p id="successText">Запись отправлена.</p>
    <div class="summary" id="lastRecordBox" style="display:none;"></div>
    <button class="success" onclick="showMainFromStorage()">🏠 Главное меню</button>
</div>

                { title: "Другое", prompt: "Описать причину" }
            ],
            "РЦ 3427 Гибка": [
                { title: "Перевод на другой РЦ", prompt: "Написать линию" },
                { title: "Ремонт", prompt: "Описать причину" },
                { title: "Другое", prompt: "Описать причину" }
            ],
            "РЦ 3428 Пила": [
                { title: "Перевод на другой РЦ", prompt: "Написать линию" },
                { title: "Ремонт", prompt: "Описать причину" },
                { title: "Другое", prompt: "Описать причину" }
            ],
            "РЦ 3430 Лазер": [
                { title: "Перевод на другой РЦ", prompt: "Написать линию" },
                { title: "Ремонт", prompt: "Описать причину" },
                { title: "Другое", prompt: "Описать причину" }
            ]
        }
    };

    const state = {
        mode: null,
        reason: "",
        minutes: "",
        customTitle: "",
        customPrompt: "",
        badNormText: ""
    };

    let isSubmitting = false;

    window.onload = function () {
        const name = localStorage.getItem("employee_name");
        const center = localStorage.getItem("employee_center");

        resetDraft();

        if (!name) return;
        if (!center) {
            showCenters(name);
            return;
        }

        showMain(name, center);
    };

    function saveName() {
        const name = document.getElementById("nameInput").value.trim();

        if (!name) {
            alert("Введите идентификатор");
            return;
        }

        localStorage.setItem("employee_name", name);
        showCenters(name);
    }

    function showCenters(name) {
        hideAll();
        document.getElementById("screen-centers").style.display = "block";
        document.getElementById("centersUserName").innerText = "Вы: " + name;

        const list = document.getElementById("centersList");
        list.innerHTML = "";

        CONFIG.centers.forEach(center => {
            const btn = document.createElement("button");
            btn.innerText = center;
            btn.onclick = () => selectCenter(center);
            list.appendChild(btn);
        });
    }

    function selectCenter(center) {
        localStorage.setItem("employee_center", center);
        resetDraft();
        showMain(getCurrentName(), center);
    }

    function showMain(name, center) {
        hideAll();
        document.getElementById("screen-main").style.display = "block";
        document.getElementById("mainHeader").innerText = name + " | " + center;
    }

    function showMainFromStorage() {
        resetDraft();
        showMain(getCurrentName(), getCurrentCenter());
    }

    function changeUser() {
        localStorage.removeItem("employee_name");
        localStorage.removeItem("employee_center");
        resetDraft();
        location.reload();
    }

    function backToCenters() {
        localStorage.removeItem("employee_center");
        resetDraft();
        showCenters(getCurrentName());
    }

    function getCurrentName() {
        return localStorage.getItem("employee_name") || "";
    }

    function getCurrentCenter() {
        return localStorage.getItem("employee_center") || "";
    }

    function resetDraft() {
        state.mode = null;
        state.reason = "";
        state.minutes = "";
        state.customTitle = "";
        state.customPrompt = "";
        state.badNormText = "";
        isSubmitting = false;

        const submitBtn = document.getElementById("submitBtn");
        const sendingNote = document.getElementById("sendingNote");

        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerText = "✅ Подтвердить и отправить";
        }

        if (sendingNote) {
            sendingNote.style.display = "none";
        }
    }

    function getStandardReasons(center) {
        return CONFIG.standardReasonsByCenter[center] || CONFIG.standardReasonsDefault;
    }

    function getCustomReasons(center) {
        return CONFIG.customReasonsByCenter[center] || [
            { title: "Другое", prompt: "Описать причину" }
        ];
    }

    function getQuickMinutes(center) {
        return CONFIG.quickMinutesByCenter[center] || CONFIG.quickMinutesDefault;
    }

    function openStandardReasons() {
        hideAll();
        resetDraft();

        state.mode = "standard";

        const center = getCurrentCenter();
        document.getElementById("screen-standard-reasons").style.display = "block";
        document.getElementById("standardHeader").innerText = getCurrentName() + " | " + center;

        const list = document.getElementById("standardReasonsList");
        list.innerHTML = "";

        getStandardReasons(center).forEach(reason => {
            const btn = document.createElement("button");
            btn.innerText = reason;
            btn.onclick = () => {
                state.reason = reason;
                openMinutes();
            };
            list.appendChild(btn);
        });
    }

    function openCustomReasons() {
        hideAll();
        resetDraft();

        state.mode = "custom";

        const center = getCurrentCenter();
        document.getElementById("screen-custom-reasons").style.display = "block";
        document.getElementById("customHeader").innerText = getCurrentName() + " | " + center;

        const list = document.getElementById("customReasonsList");
        list.innerHTML = "";

        getCustomReasons(center).forEach(item => {
            const btn = document.createElement("button");
            btn.innerText = item.title;
            btn.onclick = () => handleCustomReason(item);
            list.appendChild(btn);
        });
    }

    function handleCustomReason(item) {
        state.customTitle = item.title;
        state.customPrompt = item.prompt || "";

        if (!state.customPrompt.trim()) {
            state.reason = item.title;
            openMinutes();
            return;
        }

        hideAll();
        document.getElementById("screen-custom-detail").style.display = "block";
        document.getElementById("customDetailHeader").innerText = getCurrentName() + " | " + getCurrentCenter();
        document.getElementById("customPromptText").innerText = item.title + ": " + item.prompt;

        const input = document.getElementById("customDetailInput");
        input.value = "";
        input.placeholder = item.prompt;
    }

    function saveCustomDetail() {
        const detail = document.getElementById("customDetailInput").value.trim();

        if (!detail) {
            alert("Заполните поле");
            return;
        }

        state.reason = state.customTitle + " - " + detail;
        openMinutes();
    }

    function openBadNorm() {
        hideAll();
        resetDraft();

        state.mode = "badnorm";

        document.getElementById("screen-badnorm").style.display = "block";
        document.getElementById("badNormHeader").innerText = getCurrentName() + " | " + getCurrentCenter();
        document.getElementById("badNormInput").value = "";
    }

    function openBadNormConfirm() {
        const text = document.getElementById("badNormInput").value.trim();

        if (!text) {
            alert("Введите позицию или описание");
            return;
        }

        state.badNormText = text;
        state.reason = text;
        openConfirm();
    }

    function openMinutes() {
        hideAll();

        const center = getCurrentCenter();
        document.getElementById("screen-minutes").style.display = "block";
        document.getElementById("minutesHeader").innerText =
            getCurrentName() + " | " + center + "\nПричина: " + state.reason;

        const list = document.getElementById("quickMinutesList");
        list.innerHTML = "";

        getQuickMinutes(center).forEach(min => {
            const btn = document.createElement("button");
            btn.innerText = min + " мин";
            btn.onclick = () => {
                state.minutes = min;
                openConfirm();
            };
            list.appendChild(btn);
        });

        document.getElementById("manualMinutesInput").value = "";
    }

    function saveManualMinutes() {
        const value = document.getElementById("manualMinutesInput").value.trim();
        const minutes = Number(value);

        if (!value || !Number.isInteger(minutes) || minutes <= 0 || minutes > 1440) {
            alert("Введите минуты числом, например 12");
            return;
        }

        state.minutes = minutes;
        openConfirm();
    }

    function backFromMinutes() {
        if (state.mode === "standard") {
            openStandardReasons();
            return;
        }

        openCustomReasons();
    }

    function backFromConfirm() {
        if (state.mode === "badnorm") {
            hideAll();
            document.getElementById("screen-badnorm").style.display = "block";
            document.getElementById("badNormHeader").innerText = getCurrentName() + " | " + getCurrentCenter();
            document.getElementById("badNormInput").value = state.badNormText;
            return;
        }

        openMinutes();
    }

    function openConfirm() {
        hideAll();
        document.getElementById("screen-confirm").style.display = "block";

        let html = "";

        if (state.mode === "badnorm") {
            html =
                "<b>Идентификатор:</b> " + escapeHtml(getCurrentName()) + "<br>" +
                "<b>РЦ:</b> " + escapeHtml(getCurrentCenter()) + "<br>" +
                "<b>Тип:</b> Некорректная норма<br>" +
                "<b>Позиция / описание:</b> " + escapeHtml(state.reason);
        } else {
            html =
                "<b>Идентификатор:</b> " + escapeHtml(getCurrentName()) + "<br>" +
                "<b>РЦ:</b> " + escapeHtml(getCurrentCenter()) + "<br>" +
                "<b>Тип:</b> " + escapeHtml(state.mode === "standard" ? "Стандартный" : "Нестандартный") + "<br>" +
                "<b>Причина:</b> " + escapeHtml(state.reason) + "<br>" +
                "<b>Минуты:</b> " + escapeHtml(String(state.minutes));
        }

        document.getElementById("confirmSummary").innerHTML = html;
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").innerText = "✅ Подтвердить и отправить";
        document.getElementById("sendingNote").style.display = "none";
        isSubmitting = false;
    }

    async function submitRecord() {
        if (isSubmitting) return;

        const payload = buildPayload_();
        if (!payload) return;

        isSubmitting = true;

        const submitBtn = document.getElementById("submitBtn");
        const sendingNote = document.getElementById("sendingNote");

        submitBtn.disabled = true;
        submitBtn.innerText = "Отправка...";
        sendingNote.style.display = "block";

        try {
            await fetch(WEBHOOK_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload)
            });

            showSuccess(payload);
            resetDraft();

        } catch (err) {
            isSubmitting = false;
            submitBtn.disabled = false;
            submitBtn.innerText = "✅ Подтвердить и отправить";
            sendingNote.style.display = "none";
            alert("Не удалось отправить запись. Проверь интернет и попробуй ещё раз.");
        }
    }

    function buildPayload_() {
        const name = getCurrentName();
        const center = getCurrentCenter();

        if (!name) {
            alert("Не найден идентификатор");
            return null;
        }

        if (!center) {
            alert("Не найден РЦ");
            return null;
        }

        if (state.mode === "badnorm") {
            if (!state.reason.trim()) {
                alert("Введите позицию или описание");
                return null;
            }

            return {
                name: name,
                center: center,
                downtime_type: "badnorm",
                reason: state.reason.trim(),
                comment: ""
            };
        }

        if (!state.reason.trim()) {
            alert("Не выбрана причина");
            return null;
        }

        if (String(state.minutes).trim() === "") {
            alert("Не указаны минуты");
            return null;
        }

        return {
            name: name,
            center: center,
            downtime_type: state.mode,
            reason: state.reason.trim(),
            minutes: state.minutes,
            comment: ""
        };
    }

    function showSuccess(payload) {
        hideAll();
        document.getElementById("screen-success").style.display = "block";
        document.getElementById("successText").innerText = "Запись отправлена.";

        const box = document.getElementById("lastRecordBox");
        box.style.display = "block";

        if (payload.downtime_type === "badnorm") {
            box.innerHTML =
                "<b>Последняя запись:</b><br>" +
                escapeHtml(payload.center) + "<br>" +
                "Некорректная норма<br>" +
                escapeHtml(payload.reason);
        } else {
            box.innerHTML =
                "<b>Последняя запись:</b><br>" +
                escapeHtml(payload.center) + "<br>" +
                escapeHtml(payload.reason) + "<br>" +
                escapeHtml(String(payload.minutes)) + " мин";
        }
    }

    function hideAll() {
        document.getElementById("screen-login").style.display = "none";
        document.getElementById("screen-centers").style.display = "none";
        document.getElementById("screen-main").style.display = "none";
        document.getElementById("screen-standard-reasons").style.display = "none";
        document.getElementById("screen-custom-reasons").style.display = "none";
        document.getElementById("screen-custom-detail").style.display = "none";
        document.getElementById("screen-badnorm").style.display = "none";
        document.getElementById("screen-minutes").style.display = "none";
        document.getElementById("screen-confirm").style.display = "none";
        document.getElementById("screen-success").style.display = "none";
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
